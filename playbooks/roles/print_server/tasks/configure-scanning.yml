---

- name: Apply custom scantofile script
  become: true
  ansible.builtin.template:
    src: scantofile.sh.j2
    dest: "{{ print_server_scantofile_script_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0775'

- name: Apply custom scantofile configuration
  become: true
  ansible.builtin.template:
    src: scantofile.config.j2
    dest: "{{ print_server_scantofile_config_path }}"
    owner: root
    group: root
    mode: '0644'